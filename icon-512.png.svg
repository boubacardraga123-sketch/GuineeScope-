<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Fond blanc -->
  <rect width="512" height="512" fill="#ffffff" rx="80"/>

  <!-- Bande rouge (gauche) -->
  <rect x="0" y="0" width="170" height="512" fill="#CE1126" rx="80"/>
  <rect x="80" y="0" width="90" height="512" fill="#CE1126"/>

  <!-- Bande jaune (centre) -->
  <rect x="170" y="0" width="172" height="512" fill="#FCD116"/>

  <!-- Bande verte (droite) -->
  <rect x="342" y="0" width="170" height="512" fill="#009A44" rx="80"/>
  <rect x="342" y="0" width="90" height="512" fill="#009A44"/>

  <!-- Cercle blanc central -->
  <circle cx="256" cy="220" r="120" fill="white" opacity="0.92"/>

  <!-- Toque de diplômé -->
  <!-- Plateau -->
  <rect x="166" y="190" width="180" height="22" rx="6" fill="#1d3557"/>
  <!-- Chapeau (trapèze) -->
  <polygon points="196,190 316,190 296,148 216,148" fill="#1d3557"/>
  <!-- Bouton du dessus -->
  <circle cx="256" cy="148" r="10" fill="#e63946"/>
  <!-- Cordon -->
  <line x1="316" y1="200" x2="316" y2="230" stroke="#FCD116" stroke-width="5" stroke-linecap="round"/>
  <circle cx="316" cy="235" r="7" fill="#FCD116"/>

  <!-- Texte EtudierGN -->
  <text x="256" y="310" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-size="52" font-weight="900" fill="#1d3557" letter-spacing="-1">Étudier</text>
  <text x="256" y="365" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-size="52" font-weight="900" fill="#e63946" letter-spacing="2">GN</text>

  <!-- Sous-titre -->
  <text x="256" y="410" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="22" fill="#555" letter-spacing="1">Plateforme éducative</text>
</svg>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, orderBy, query,
  addDoc, serverTimestamp, doc, updateDoc, setDoc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ======================================================
// 🔧 REMPLACEZ CES VALEURS PAR VOTRE CONFIG FIREBASE
// ======================================================
const firebaseConfig = {
  apiKey: "AIzaSyAUFd6H0y--K090_lau3sr6H0lGxmfgB9M",
  authDomain: "etudier-gn.firebaseapp.com",
  projectId: "etudier-gn",
  storageBucket: "etudier-gn.firebasestorage.app",
  messagingSenderId: "197482090989",
  appId: "1:197482090989:web:f82716bc4fe080017357e4"
};
// ======================================================

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let items = [];
let currentCat = 'tout';

function ytId(url) {
  if (!url) return '';
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : url.trim();
}
function ytThumb(id){ return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }
function fmtDate(ts){
  const diff=(Date.now()-ts)/1000;
  if(diff<3600) return `Il y a ${Math.floor(diff/60)} min`;
  if(diff<86400) return `Il y a ${Math.floor(diff/3600)} h`;
  return `Il y a ${Math.floor(diff/86400)} j`;
}

window.setTab = function(btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  render();
};

function render(){
  const q = (document.getElementById('search-input')||{value:''}).value.toLowerCase();
  let filtered = currentCat==='tout' ? [...items] : items.filter(i=>i.type===currentCat);
  if(q) filtered = filtered.filter(i=>
    (i.titre||'').toLowerCase().includes(q) ||
    (i.matiere||'').toLowerCase().includes(q) ||
    (i.desc||'').toLowerCase().includes(q) ||
    (i.niveau||'').toLowerCase().includes(q)
  );
  const feed = document.getElementById('feed');
  if(!filtered.length){
    feed.innerHTML=`<div class="empty-feed"><div class="ei">📭</div>Aucune ressource disponible.<br>Revenez bientôt !</div>`;
    return;
  }
  let html='';
  const media  = filtered.filter(i=>i.type==='video'||i.type==='image');
  const others = filtered.filter(i=>i.type!=='video'&&i.type!=='image');

  if((currentCat==='tout'||currentCat==='video'||currentCat==='image') && media.length){
    html+=`<div class="section-div">Médias</div>`;
    for(let i=0;i<media.length;i+=2){
      html+=`<div class="video-row">`;
      html+=renderMedia(media[i]);
      if(media[i+1]) html+=renderMedia(media[i+1]);
      html+=`</div>`;
    }
  }
  if((currentCat==='tout'||currentCat==='cours'||currentCat==='exercice') && others.length){
    html+=`<div class="section-div">Cours & Exercices</div>`;
    others.forEach(item=>{ html+=renderCours(item); });
  }
  if(currentCat==='cours')    filtered.filter(i=>i.type==='cours').forEach(i=>{html+=renderCours(i);});
  if(currentCat==='exercice') filtered.filter(i=>i.type==='exercice').forEach(i=>{html+=renderCours(i);});
  feed.innerHTML = html || `<div class="empty-feed"><div class="ei">📭</div>Aucune ressource.</div>`;
}

function renderMedia(item){
  const isV = item.type==='video';
  const id  = isV ? ytId(item.ytid||'') : '';
  const src = isV ? ytThumb(id) : item.imgurl;
  return `<div class="vid-card" onclick="openItem('${item.id}')">
    <img src="${src}" alt="${item.titre}" loading="lazy">
    ${isV?`<div class="play"></div>`:''}
    <span class="badge badge-${item.type}">${isV?'Vidéo':'Image'}</span>
    <div class="vid-title">${item.titre}</div>
  </div>`;
}

function renderCours(item){
  const icon = item.type==='cours'?'📖':'✏️';
  const bg   = item.type==='cours'?'linear-gradient(135deg,#e8f0fe,#c5d8f6)':'linear-gradient(135deg,#ffe8e8,#ffc5c5)';
  const top  = item.thumb
    ? `<img src="${item.thumb}" alt="${item.titre}" style="width:100%;height:100%;object-fit:cover;">`
    : `<span>${icon}</span>`;
  return `<div class="cours-card" onclick="openItem('${item.id}')">
    <div class="cours-card-top" style="background:${bg}">${top}</div>
    <div class="cours-card-body">
      <span class="cours-badge badge-${item.type}">${item.type==='cours'?'Cours':'Exercice'}</span>
      <div class="cours-card-title">${item.titre}</div>
      <div class="cours-card-desc">${item.desc||''}</div>
      <div class="cours-card-meta">
        ${item.matiere?`<span>📚 ${item.matiere}</span>`:''}
        ${item.niveau?`<span>🎓 ${item.niveau}</span>`:''}
        <span>${fmtDate(item.date)}</span>
      </div>
    </div>
  </div>`;
}

window.openItem = function(id){
  const item = items.find(i=>i.id===id);
  if(!item) return;
  // Incrémenter les vues
  const views = parseInt(localStorage.getItem('views_'+id)||'0');
  localStorage.setItem('views_'+id, views+1);
  document.getElementById('modal-title').textContent = item.titre;
  let body=`<div class="modal-meta-tags">
    ${item.matiere?`<span class="mtag">📚 ${item.matiere}</span>`:''}
    ${item.niveau?`<span class="mtag">🎓 ${item.niveau}</span>`:''}
    <span class="mtag">${fmtDate(item.date)}</span>
  </div>`;
  if(item.desc) body+=`<div class="modal-desc">${item.desc}</div>`;
  if(item.type==='video'){
    const vid=ytId(item.ytid||'');
    body+=`<div class="yt-wrap"><iframe src="https://www.youtube.com/embed/${vid}?autoplay=1" allow="autoplay;encrypted-media" allowfullscreen></iframe></div>`;
  } else if(item.type==='image'){
    body+=`<img class="modal-img" src="${item.imgurl}" alt="${item.titre}">`;
  }
  if(item.contenu) {
    // Essayer de parser comme JSON (contenu riche), sinon afficher comme texte
    try {
      const blocks = JSON.parse(item.contenu);
      if (Array.isArray(blocks) && blocks.length) {
        let richHtml = '<div class="rich-content">';
        blocks.forEach(blk => {
          if (!blk.value || !blk.value.trim()) return;
          if (blk.type === 'title') {
            richHtml += `<div class="rich-block-title">${blk.value}</div>`;
          } else if (blk.type === 'paragraph') {
            richHtml += `<div class="rich-block-para">${blk.value}</div>`;
          } else if (blk.type === 'image') {
            richHtml += `<img class="rich-block-img" src="${blk.value}" alt="image" loading="lazy">`;
          }
        });
        richHtml += '</div>';
        body += richHtml;
      }
    } catch(e) {
      // Ancien format texte brut
      body += `<div class="modal-text">${item.contenu}</div>`;
    }
  }
  // Bouton partage WhatsApp
  const shareText = encodeURIComponent('📚 ' + item.titre + ' - EtudierGN\n' + window.location.href);
  const shareHtml = `<div class="modal-actions">
    <a class="btn-share" href="https://wa.me/?text=${shareText}" target="_blank">📲 Partager sur WhatsApp</a>
  </div>`;

  // Likes
  const likes = getLikes(item.id);
  const liked = isLiked(item.id);
  const likeHtml = `<div class="like-row">
    <button class="like-btn ${liked?'liked':''}" id="like-btn-${item.id}" onclick="toggleLike('${item.id}')">
      <span class="licon">${liked?'❤️':'🤍'}</span> <span id="like-count-${item.id}">${likes}</span> J'aime
    </button>
  </div>`;

  document.getElementById('modal-body').innerHTML = shareHtml + likeHtml + body + renderComments(item.id);
  document.getElementById('modal-bg').classList.add('open');
  loadComments(item.id);
  document.body.style.overflow='hidden';
};

window.closeMBg = function(e){ if(e.target===document.getElementById('modal-bg')) closeModal(); };
window.closeModal = function(){
  document.getElementById('modal-bg').classList.remove('open');
  document.getElementById('modal-body').innerHTML='';
  document.body.style.overflow='';
};


// ===== LIKES =====
function getLikes(id){ return parseInt(localStorage.getItem('likes_'+id)||'0'); }
function isLiked(id){ return localStorage.getItem('liked_'+id)==='1'; }
window.toggleLike = function(id){
  const liked = isLiked(id);
  const count = getLikes(id);
  const newLiked = !liked;
  const newCount = newLiked ? count+1 : Math.max(0,count-1);
  localStorage.setItem('liked_'+id, newLiked?'1':'0');
  localStorage.setItem('likes_'+id, newCount);
  const btn = document.getElementById('like-btn-'+id);
  const cnt = document.getElementById('like-count-'+id);
  if(btn){ btn.className='like-btn'+(newLiked?' liked':''); btn.querySelector('.licon').textContent=newLiked?'❤️':'🤍'; }
  if(cnt) cnt.textContent=newCount;
};

// ===== COMMENTAIRES =====
function getComments(id){ return JSON.parse(localStorage.getItem('comments_'+id)||'[]'); }
function saveComments(id,arr){ localStorage.setItem('comments_'+id, JSON.stringify(arr)); }

function renderComments(id){
  const comments = getComments(id);
  const list = comments.length ? comments.map(c=>`
    <div class="comment-item">
      <div class="comment-name">${c.name}</div>
      <div class="comment-text">${c.text}</div>
      <div class="comment-date">${c.date}</div>
    </div>`).join('') : '<p style="color:#bbb;font-size:.78rem;text-align:center;padding:.5rem">Aucun commentaire. Soyez le premier !</p>';
  return `<div class="comments-section">
    <div class="comments-title">💬 Commentaires (${comments.length})</div>
    <div id="comments-list-${id}">${list}</div>
    <div class="comment-form">
      <input type="text" id="c-name-${id}" placeholder="Votre nom…" maxlength="30">
      <textarea id="c-text-${id}" placeholder="Votre commentaire…" maxlength="300"></textarea>
      <button class="btn-comment" onclick="addComment('${id}')">Envoyer 💬</button>
    </div>
  </div>`;
}

window.addComment = function(id){
  const name = (document.getElementById('c-name-'+id)||{value:''}).value.trim();
  const text = (document.getElementById('c-text-'+id)||{value:''}).value.trim();
  if(!name||!text){ alert('Remplissez votre nom et commentaire !'); return; }
  const comments = getComments(id);
  comments.unshift({name, text, date: new Date().toLocaleDateString('fr-FR')});
  saveComments(id, comments);
  const list = document.getElementById('comments-list-'+id);
  if(list) list.innerHTML = comments.map(c=>`
    <div class="comment-item">
      <div class="comment-name">${c.name}</div>
      <div class="comment-text">${c.text}</div>
      <div class="comment-date">${c.date}</div>
    </div>`).join('');
  document.getElementById('c-name-'+id).value='';
  document.getElementById('c-text-'+id).value='';
};

  if(!('Notification' in window)){ alert('Notifications non supportées sur ce navigateur.'); return; }
  const perm = await Notification.requestPermission();
  if(perm==='granted'){
    document.getElementById('notif-bar').style.display='none';

// ===== CHAT VISITEUR =====
let chatSessionId = localStorage.getItem('chat_session_id');
let visitorName   = localStorage.getItem('chat_visitor_name') || '';
let chatUnsubscribe = null;
let chatOpen = false;
let unreadCount = 0;

// Générer un ID de session unique si inexistant
if (!chatSessionId) {
  chatSessionId = 'v_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
  localStorage.setItem('chat_session_id', chatSessionId);
}

window.toggleChat = function() {
  chatOpen = !chatOpen;
  const box = document.getElementById('chat-box');
  box.classList.toggle('open', chatOpen);
  if (chatOpen) {
    unreadCount = 0;
    updateBadge();
    if (!visitorName) {
      document.getElementById('chat-name-section').style.display = 'block';
      document.getElementById('chat-form').style.display = 'none';
      setTimeout(()=>document.getElementById('chat-visitor-name').focus(), 100);
    } else {
      document.getElementById('chat-name-section').style.display = 'none';
      document.getElementById('chat-form').style.display = 'flex';
      startChatListen();
      setTimeout(()=>document.getElementById('chat-input').focus(), 100);
    }
  }
};

window.saveVisitorName = function() {
  const name = document.getElementById('chat-visitor-name').value.trim();
  if (!name) return;
  visitorName = name;
  localStorage.setItem('chat_visitor_name', name);
  document.getElementById('chat-name-section').style.display = 'none';
  document.getElementById('chat-form').style.display = 'flex';
  // Créer/maj session dans Firestore
  setDoc(doc(db, 'chats', chatSessionId), {
    visitorName: name, sessionId: chatSessionId,
    lastActivity: serverTimestamp(), unreadByAdmin: 0
  }, {merge: true});
  startChatListen();
  setTimeout(()=>document.getElementById('chat-input').focus(), 100);
};

function startChatListen() {
  if (chatUnsubscribe) return; // déjà en écoute
  const msgsRef = collection(db, 'chats', chatSessionId, 'messages');
  const mq = query(msgsRef, orderBy('ts','asc'));
  chatUnsubscribe = onSnapshot(mq, snap => {
    const msgs = snap.docs.map(d => ({id:d.id, ...d.data()}));
    renderChatMessages(msgs);
    if (!chatOpen) {
      const newAdmin = msgs.filter(m => m.sender==='admin' && !m.seenByVisitor).length;
      if (newAdmin > 0) { unreadCount = newAdmin; updateBadge(); }
    }
  });
}

function renderChatMessages(msgs) {
  const container = document.getElementById('chat-messages');
  const empty = document.getElementById('chat-empty');
  if (!msgs.length) { if(empty) empty.style.display='block'; return; }
  if(empty) empty.style.display='none';
  container.innerHTML = msgs.map(m => {
    const isAdmin = m.sender === 'admin';
    const time = m.ts ? new Date(m.ts.seconds*1000).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="chat-msg ${isAdmin?'admin':'visitor'}">
      ${isAdmin ? '<strong style="font-size:.68rem;opacity:.7;display:block;margin-bottom:2px;">EtudierGN</strong>' : ''}
      ${m.text}
      <div class="chat-msg-time">${time}</div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function updateBadge() {
  const b = document.getElementById('chat-badge');
  if (unreadCount > 0) {
    b.textContent = unreadCount; b.style.display='flex';
  } else {
    b.style.display='none';
  }
}

window.sendVisitorMsg = async function() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !visitorName) return;
  input.value = '';
  const msgsRef = collection(db, 'chats', chatSessionId, 'messages');
  await addDoc(msgsRef, {
    text, sender: 'visitor', visitorName,
    ts: serverTimestamp(), seenByAdmin: false
  });
  // Mettre à jour la session
  await setDoc(doc(db, 'chats', chatSessionId), {
    visitorName, sessionId: chatSessionId,
    lastMessage: text, lastActivity: serverTimestamp(),
    unreadByAdmin: 99 // sera reset côté admin
  }, {merge: true});
};

// Démarrer l'écoute chat si nom déjà connu
if (visitorName) startChatListen();

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EtudierGN</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Inter',sans-serif;background:#f2f3f5;color:#111;min-height:100vh;max-width:480px;margin:0 auto;}
.topbar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e5e7eb;
  display:flex;align-items:center;justify-content:space-between;padding:0 12px;height:50px;}
.logo{font-size:1.15rem;font-weight:700;}.logo span{color:#e63946;}
.topbar-right a{font-size:.78rem;color:#555;text-decoration:none;background:#f2f3f5;padding:.35rem .75rem;border-radius:20px;}
.tabs{position:sticky;top:50px;z-index:99;background:#fff;border-bottom:2px solid #e5e7eb;
  display:flex;overflow-x:auto;scrollbar-width:none;padding:0 4px;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;font-size:.82rem;font-weight:500;color:#888;padding:.65rem .95rem;
  border:none;background:none;cursor:pointer;position:relative;white-space:nowrap;}
.tab.active{color:#e63946;font-weight:700;}
.tab.active::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:#e63946;}
.feed{padding:8px 0 68px;}
.video-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:4px 8px;}
.vid-card{background:#000;border-radius:8px;overflow:hidden;position:relative;aspect-ratio:9/13;cursor:pointer;}
.vid-card img{width:100%;height:100%;object-fit:cover;opacity:.85;}
.vid-card .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:36px;height:36px;background:rgba(255,255,255,.85);border-radius:50%;
  display:flex;align-items:center;justify-content:center;}
.vid-card .play::after{content:'▶';font-size:.8rem;color:#111;margin-left:2px;}
.vid-card .badge{position:absolute;top:7px;left:7px;font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;}
.badge-video{background:#1d3557;color:#fff;}.badge-image{background:#457b9d;color:#000;}
.cours-card{background:#fff;margin:4px 8px;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #e5e7eb;}
.cours-card-top{height:110px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;}
.cours-card-top img{width:100%;height:100%;object-fit:cover;}
.cours-card-body{padding:10px 12px;}
.cours-badge{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:3px;text-transform:uppercase;margin-bottom:5px;}
.badge-cours{background:#1d3557;color:#fff;}.badge-exercice{background:#e63946;color:#fff;}
.cours-card-title{font-size:.9rem;font-weight:600;line-height:1.4;margin-bottom:4px;}
.cours-card-desc{font-size:.76rem;color:#888;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cours-card-meta{font-size:.7rem;color:#aaa;margin-top:6px;display:flex;gap:10px;}
.section-div{padding:10px 12px 4px;font-size:.78rem;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;background:#f2f3f5;}
.modal-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);align-items:flex-end;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #f0f0f0;}
.modal-head h2{font-size:.95rem;font-weight:700;flex:1;padding-right:8px;line-height:1.3;}
.modal-close{background:#f2f3f5;border:none;border-radius:50%;width:30px;height:30px;font-size:1rem;cursor:pointer;flex-shrink:0;}
.modal-body{padding:14px;}
.yt-wrap{aspect-ratio:16/9;border-radius:10px;overflow:hidden;margin-bottom:12px;}
.yt-wrap iframe{width:100%;height:100%;border:none;}
.modal-img{width:100%;border-radius:10px;margin-bottom:12px;}
.modal-meta-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.mtag{background:#f2f3f5;font-size:.72rem;padding:3px 8px;border-radius:4px;color:#555;}
.modal-text{font-size:.88rem;line-height:1.8;color:#222;white-space:pre-wrap;}
.modal-desc{font-size:.82rem;color:#888;margin-bottom:10px;}
.empty-feed{text-align:center;padding:3rem 1rem;color:#aaa;font-size:.88rem;}
.empty-feed .ei{font-size:2rem;margin-bottom:.5rem;}
.loading{text-align:center;padding:3rem 1rem;color:#aaa;font-size:.85rem;}
.loading .spinner{width:28px;height:28px;border:3px solid #f2f3f5;border-top-color:#e63946;
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px;}
@keyframes spin{to{transform:rotate(360deg);}}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:#fff;border-top:1px solid #e5e7eb;display:flex;z-index:100;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 0;font-size:.62rem;color:#aaa;cursor:pointer;gap:2px;}
.bnav-item.active{color:#e63946;}
.bnav-icon{font-size:1.2rem;}
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#333;color:#fff;font-size:.82rem;padding:.55rem 1.2rem;border-radius:20px;
  opacity:0;transition:.3s;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" id="logo-secret" onclick="secretClick()" style="cursor:pointer;user-select:none;">Étudier<span>GN</span></div>
  <div class="topbar-right"></div>
</div>

<div class="tabs">
  <button class="tab active" data-cat="tout" onclick="setTab(this)">Pour vous</button>
  <button class="tab" data-cat="video" onclick="setTab(this)">🎬 Vidéos</button>
  <button class="tab" data-cat="cours" onclick="setTab(this)">📖 Cours</button>
  <button class="tab" data-cat="exercice" onclick="setTab(this)">✏️ Exercices</button>
  <button class="tab" data-cat="image" onclick="setTab(this)">🖼️ Images</button>
</div>

<div class="feed" id="feed">
  <div class="loading"><div class="spinner"></div>Chargement…</div>
</div>

<div class="modal-bg" id="modal-bg" onclick="closeMBg(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-head">
      <h2 id="modal-title"></h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<div class="bottom-nav">
  <div class="bnav-item active"><div class="bnav-icon">🏠</div>Accueil</div>
  <div style="flex:2;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#bbb;text-align:center;line-height:1.3;">© EtudierGN<br><span style="color:#e63946;font-weight:600;">Collection BHDS</span></div>
</div>
<div id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, orderBy, query }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ======================================================
// 🔧 REMPLACEZ CES VALEURS PAR VOTRE CONFIG FIREBASE
// ======================================================
const firebaseConfig = {
  apiKey: "AIzaSyAUFd6H0y--K090_lau3sr6H0lGxmfgB9M",
  authDomain: "etudier-gn.firebaseapp.com",
  projectId: "etudier-gn",
  storageBucket: "etudier-gn.firebasestorage.app",
  messagingSenderId: "197482090989",
  appId: "1:197482090989:web:f82716bc4fe080017357e4"
};
// ======================================================

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let items = [];
let currentCat = 'tout';

function ytId(url) {
  if (!url) return '';
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : url.trim();
}
function ytThumb(id){ return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }
function fmtDate(ts){
  const diff=(Date.now()-ts)/1000;
  if(diff<3600) return `Il y a ${Math.floor(diff/60)} min`;
  if(diff<86400) return `Il y a ${Math.floor(diff/3600)} h`;
  return `Il y a ${Math.floor(diff/86400)} j`;
}

window.setTab = function(btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  render();
};

function render(){
  let filtered = currentCat==='tout' ? [...items] : items.filter(i=>i.type===currentCat);
  const feed = document.getElementById('feed');
  if(!filtered.length){
    feed.innerHTML=`<div class="empty-feed"><div class="ei">📭</div>Aucune ressource disponible.<br>Revenez bientôt !</div>`;
    return;
  }
  let html='';
  const media  = filtered.filter(i=>i.type==='video'||i.type==='image');
  const others = filtered.filter(i=>i.type!=='video'&&i.type!=='image');

  if((currentCat==='tout'||currentCat==='video'||currentCat==='image') && media.length){
    html+=`<div class="section-div">Médias</div>`;
    for(let i=0;i<media.length;i+=2){
      html+=`<div class="video-row">`;
      html+=renderMedia(media[i]);
      if(media[i+1]) html+=renderMedia(media[i+1]);
      html+=`</div>`;
    }
  }
  if((currentCat==='tout'||currentCat==='cours'||currentCat==='exercice') && others.length){
    html+=`<div class="section-div">Cours & Exercices</div>`;
    others.forEach(item=>{ html+=renderCours(item); });
  }
  if(currentCat==='cours')    filtered.filter(i=>i.type==='cours').forEach(i=>{html+=renderCours(i);});
  if(currentCat==='exercice') filtered.filter(i=>i.type==='exercice').forEach(i=>{html+=renderCours(i);});
  feed.innerHTML = html || `<div class="empty-feed"><div class="ei">📭</div>Aucune ressource.</div>`;
}

function renderMedia(item){
  const isV = item.type==='video';
  const id  = isV ? ytId(item.ytid||'') : '';
  const src = isV ? ytThumb(id) : item.imgurl;
  return `<div class="vid-card" onclick="openItem('${item.id}')">
    <img src="${src}" alt="${item.titre}" loading="lazy">
    ${isV?`<div class="play"></div>`:''}
    <span class="badge badge-${item.type}">${isV?'Vidéo':'Image'}</span>
  </div>`;
}

function renderCours(item){
  const icon = item.type==='cours'?'📖':'✏️';
  const bg   = item.type==='cours'?'linear-gradient(135deg,#e8f0fe,#c5d8f6)':'linear-gradient(135deg,#ffe8e8,#ffc5c5)';
  const top  = item.thumb
    ? `<img src="${item.thumb}" alt="${item.titre}" style="width:100%;height:100%;object-fit:cover;">`
    : `<span>${icon}</span>`;
  return `<div class="cours-card" onclick="openItem('${item.id}')">
    <div class="cours-card-top" style="background:${bg}">${top}</div>
    <div class="cours-card-body">
      <span class="cours-badge badge-${item.type}">${item.type==='cours'?'Cours':'Exercice'}</span>
      <div class="cours-card-title">${item.titre}</div>
      <div class="cours-card-desc">${item.desc||''}</div>
      <div class="cours-card-meta">
        ${item.matiere?`<span>📚 ${item.matiere}</span>`:''}
        ${item.niveau?`<span>🎓 ${item.niveau}</span>`:''}
        <span>${fmtDate(item.date)}</span>
      </div>
    </div>
  </div>`;
}

window.openItem = function(id){
  const item = items.find(i=>i.id===id);
  if(!item) return;
  document.getElementById('modal-title').textContent = item.titre;
  let body=`<div class="modal-meta-tags">
    ${item.matiere?`<span class="mtag">📚 ${item.matiere}</span>`:''}
    ${item.niveau?`<span class="mtag">🎓 ${item.niveau}</span>`:''}
    <span class="mtag">${fmtDate(item.date)}</span>
  </div>`;
  if(item.desc) body+=`<div class="modal-desc">${item.desc}</div>`;
  if(item.type==='video'){
    const vid=ytId(item.ytid||'');
    body+=`<div class="yt-wrap"><iframe src="https://www.youtube.com/embed/${vid}?autoplay=1" allow="autoplay;encrypted-media" allowfullscreen></iframe></div>`;
  } else if(item.type==='image'){
    body+=`<img class="modal-img" src="${item.imgurl}" alt="${item.titre}">`;
  }
  if(item.contenu) body+=`<div class="modal-text">${item.contenu}</div>`;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-bg').classList.add('open');
  document.body.style.overflow='hidden';
};

window.closeMBg = function(e){ if(e.target===document.getElementById('modal-bg')) closeModal(); };
window.closeModal = function(){
  document.getElementById('modal-bg').classList.remove('open');
  document.getElementById('modal-body').innerHTML='';
  document.body.style.overflow='';
};

// Écoute temps réel Firestore
const q = query(collection(db,'ressources'), orderBy('date','desc'));
onSnapshot(q, snap=>{
  items = snap.docs.map(d=>({id:d.id,...d.data()}));
  render();
});
</script>

<script>
let _sc = 0, _st = null;
function secretClick() {
  _sc++;
  clearTimeout(_st);
  if (_sc >= 5) {
    _sc = 0;
    window.location.href = 'admin.html';
  } else {
    _st = setTimeout(() => { _sc = 0; }, 2000);
  }
}
</script>
</body>
</html>

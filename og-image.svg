<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d3557;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1f35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#CE1126;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FCD116;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#009A44;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Fond principal -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Motif de points décoratifs -->
  <circle cx="50" cy="50" r="3" fill="white" opacity="0.06"/>
  <circle cx="150" cy="80" r="2" fill="white" opacity="0.06"/>
  <circle cx="100" cy="150" r="4" fill="white" opacity="0.04"/>
  <circle cx="1100" cy="100" r="3" fill="white" opacity="0.06"/>
  <circle cx="1050" cy="200" r="2" fill="white" opacity="0.05"/>
  <circle cx="1150" cy="300" r="4" fill="white" opacity="0.04"/>
  <circle cx="80" cy="500" r="3" fill="white" opacity="0.05"/>
  <circle cx="200" cy="560" r="2" fill="white" opacity="0.06"/>
  <circle cx="1000" cy="550" r="3" fill="white" opacity="0.05"/>
  <circle cx="1120" cy="480" r="2" fill="white" opacity="0.06"/>

  <!-- Cercles décoratifs en arrière-plan -->
  <circle cx="980" cy="315" r="280" fill="white" opacity="0.03"/>
  <circle cx="980" cy="315" r="200" fill="white" opacity="0.03"/>
  <circle cx="220" cy="315" r="200" fill="white" opacity="0.02"/>

  <!-- Barre de couleurs drapeau guinéen (haut) -->
  <rect x="0" y="0" width="400" height="8" fill="#CE1126"/>
  <rect x="400" y="0" width="400" height="8" fill="#FCD116"/>
  <rect x="800" y="0" width="400" height="8" fill="#009A44"/>

  <!-- Barre de couleurs drapeau guinéen (bas) -->
  <rect x="0" y="622" width="400" height="8" fill="#CE1126"/>
  <rect x="400" y="622" width="400" height="8" fill="#FCD116"/>
  <rect x="800" y="622" width="400" height="8" fill="#009A44"/>

  <!-- === PARTIE GAUCHE : Logo et nom === -->

  <!-- Cercle logo -->
  <circle cx="260" cy="270" r="130" fill="white" opacity="0.08"/>
  <circle cx="260" cy="270" r="110" fill="white" opacity="0.06"/>

  <!-- Toque de diplômé (grande) -->
  <!-- Plateau -->
  <rect x="185" y="258" width="150" height="20" rx="5" fill="white" filter="url(#shadow)"/>
  <!-- Chapeau -->
  <polygon points="210,258 310,258 292,215 228,215" fill="white" filter="url(#shadow)"/>
  <!-- Bouton -->
  <circle cx="260" cy="215" r="10" fill="#FCD116"/>
  <!-- Cordon -->
  <line x1="310" y1="267" x2="310" y2="295" stroke="#FCD116" stroke-width="5" stroke-linecap="round"/>
  <circle cx="310" cy="302" r="8" fill="#FCD116"/>

  <!-- Nom du site -->
  <text x="260" y="370" text-anchor="middle"
        font-family="Arial Black, Arial, sans-serif"
        font-size="68" font-weight="900" fill="white" filter="url(#shadow)">Étudier<tspan fill="#e63946">GN</tspan></text>

  <!-- Sous-titre -->
  <text x="260" y="415" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="22" fill="#FCD116" letter-spacing="2">PLATEFORME ÉDUCATIVE GUINÉENNE</text>

  <!-- Ligne séparatrice verticale -->
  <rect x="520" y="80" width="2" height="470" fill="url(#accentGrad)" opacity="0.5" rx="1"/>

  <!-- === PARTIE DROITE : Description et icônes === -->

  <!-- Accroche principale -->
  <text x="620" y="160" font-family="Arial Black, Arial, sans-serif"
        font-size="38" font-weight="900" fill="white">Apprends. Progresse.</text>
  <text x="620" y="210" font-family="Arial Black, Arial, sans-serif"
        font-size="38" font-weight="900" fill="#FCD116">Réussis.</text>

  <!-- Description -->
  <text x="620" y="270" font-family="Arial, sans-serif"
        font-size="22" fill="#b0c4de">Cours · Exercices · Vidéos · Annales · Livres</text>
  <text x="620" y="305" font-family="Arial, sans-serif"
        font-size="20" fill="#8fa8c0">Pour les lycéens et étudiants de Guinée</text>

  <!-- Ligne décorative -->
  <rect x="620" y="330" width="60" height="4" fill="#e63946" rx="2"/>
  <rect x="690" y="330" width="60" height="4" fill="#FCD116" rx="2"/>
  <rect x="760" y="330" width="60" height="4" fill="#009A44" rx="2"/>

  <!-- Fonctionnalités (icônes + texte) -->
  <!-- Vidéos -->
  <circle cx="645" cy="400" r="28" fill="#e63946" opacity="0.2"/>
  <text x="645" y="410" text-anchor="middle" font-size="26">🎬</text>
  <text x="685" y="395" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white">Vidéos éducatives</text>
  <text x="685" y="416" font-family="Arial, sans-serif" font-size="14" fill="#8fa8c0">YouTube · Explications</text>

  <!-- Cours -->
  <circle cx="645" cy="465" r="28" fill="#FCD116" opacity="0.15"/>
  <text x="645" y="475" text-anchor="middle" font-size="26">📖</text>
  <text x="685" y="460" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white">Cours &amp; Exercices</text>
  <text x="685" y="481" font-family="Arial, sans-serif" font-size="14" fill="#8fa8c0">PDF · Toutes matières</text>

  <!-- Annales -->
  <circle cx="645" cy="530" r="28" fill="#009A44" opacity="0.2"/>
  <text x="645" y="540" text-anchor="middle" font-size="26">📝</text>
  <text x="685" y="525" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white">Annales &amp; Livres</text>
  <text x="685" y="546" font-family="Arial, sans-serif" font-size="14" fill="#8fa8c0">BAC · BEPC · Concours</text>

  <!-- URL du site -->
  <rect x="620" y="580" width="520" height="36" rx="18" fill="white" opacity="0.1"/>
  <text x="880" y="603" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="17" fill="white" opacity="0.85">
    🌐 boubacardraga123-sketch.github.io/GuineeScope-/
  </text>
</svg>
